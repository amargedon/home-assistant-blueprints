blueprint:
  name: Critical Smoke Detector Alert
  description: >
    Sends critical notifications to Home Assistant Companion App devices
    when a smoke detector detects smoke. Notifications repeat until the
    alarm clears. Optionally turns on lights.

  domain: automation

  input:
    smoke_detectors:
      name: Smoke detectors
      selector:
        entity:
          domain: binary_sensor
          device_class: smoke
          multiple: true

    mobile_devices:
      name: Mobile devices
      description: Phones running the Home Assistant Companion App
      selector:
        device:
          integration: mobile_app
          multiple: true

    emergency_lights:
      name: Emergency lights (optional)
      default: {}
      selector:
        target:
          entity:
            domain: light

    repeat_interval:
      name: Repeat notification interval
      description: How often to resend alerts while smoke is active
      default: 60
      selector:
        number:
          min: 10
          max: 600
          unit_of_measurement: seconds
          mode: slider

mode: restart

trigger:
  - platform: state
    entity_id: !input smoke_detectors
    to: "on"

variables:
  area: "{{ area_name(trigger.entity_id) or 'unknown area' }}"
  detector: "{{ trigger.to_state.name }}"

action:
  - choose:
      - conditions: "{{ !input emergency_lights != {} }}"
        sequence:
          - service: light.turn_on
            target: !input emergency_lights
            data:
              brightness_pct: 100
              color_name: red

  - repeat:
      while:
        - condition: state
          entity_id: "{{ trigger.entity_id }}"
          state: "on"
      sequence:

        - repeat:
            for_each: !input mobile_devices
            sequence:
              - device_id: "{{ repeat.item }}"
                domain: mobile_app
                type: notify
                title: "🚨 SMOKE DETECTED"
                message: >
                  Smoke detected by {{ detector }} in {{ area }}.
                data:
                  push:
                    sound:
                      name: default
                      critical: 1
                      volume: 1.0

        - delay:
            seconds: !input repeat_interval
