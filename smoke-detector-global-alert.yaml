blueprint:
  name: Critical Smoke Detector Alert (Manual Selection + Companion App)
  description: >
    Sends critical notifications to Home Assistant Companion App devices
    when a selected smoke detector detects smoke. Includes sensor name and area.
    Repeats sound until the alarm clears. Optional emergency lights.

  domain: automation

  input:
    smoke_detectors:
      name: Smoke detectors
      description: Select one or more smoke detectors
      selector:
        entity:
          domain: binary_sensor
          device_class: smoke
          multiple: true

    notify_services:
      name: Phone notification services
      description: Select the Companion App notify services (notify.mobile_app_*)
      selector:
        entity:
          domain: notify
          multiple: true

    emergency_lights:
      name: Emergency lights (optional)
      default: {}
      selector:
        target:
          entity:
            domain: light

    repeat_interval:
      name: Notification repeat interval
      description: How often to resend alerts while smoke is active (seconds)
      default: 60
      selector:
        number:
          min: 10
          max: 600
          unit_of_measurement: seconds
          mode: slider

mode: restart

trigger:
  - platform: state
    entity_id: !input smoke_detectors
    to: "on"

variables:
  detector: "{{ trigger.to_state.name }}"
  area: "{{ area_name(trigger.entity_id) or 'unknown area' }}"
  lights: !input emergency_lights

action:

  # Turn on emergency lights if configured
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ lights != {} }}"
        sequence:
          - service: light.turn_on
            target: !input emergency_lights
            data:
              brightness_pct: 100
              color_name: red

  # Repeat notifications while smoke detector is ON
  - repeat:
      while:
        - condition: template
          value_template: "{{ is_state(trigger.entity_id, 'on') }}"
      sequence:

        # Send critical notifications to all selected phones
        - repeat:
            for_each: !input notify_services
            sequence:
              - service: "{{ repeat.item }}"
                data:
                  title: "🚨 SMOKE DETECTED"
                  message: >
                    Smoke detected by {{ detector }} in {{ area }}!
                  data:
                    push:
                      sound:
                        name: default
                        critical: 1
                        volume: 1.0

        - delay:
            seconds: !input repeat_interval
